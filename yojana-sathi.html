<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yojana Sathi — Welfare Scheme Chatbot</title>
<style>
  :root{
    --saffron:#e8740c; --green:#1a7a3a; --navy:#1f3b6e; --bg:#f4f1ea;
    --bot:#ffffff; --user:#1a7a3a; --chip:#fff7ee; --border:#e3dccd;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Segoe UI","Noto Sans","Noto Sans Devanagari","Noto Sans Telugu",sans-serif; background:var(--bg); height:100vh; display:flex; flex-direction:column;}
  header{background:linear-gradient(135deg,var(--navy),#2a4f8f); color:#fff; padding:10px 16px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,.18);}
  header .logo{width:40px; height:40px; border-radius:50%; background:conic-gradient(var(--saffron) 0 33%, #fff 33% 66%, var(--green) 66% 100%); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  header h1{font-size:18px; line-height:1.1;}
  header .sub{font-size:11.5px; opacity:.85;}
  .spacer{flex:1;}
  .langbar{display:flex; gap:4px; background:rgba(255,255,255,.14); border-radius:20px; padding:3px;}
  .langbar button{border:none; background:transparent; color:#fff; padding:5px 12px; border-radius:16px; cursor:pointer; font-size:13px;}
  .langbar button.active{background:#fff; color:var(--navy); font-weight:600;}
  .iconbtn{border:none; background:rgba(255,255,255,.14); color:#fff; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:16px;}
  #settings{display:none; background:#fffdf6; border-bottom:1px solid var(--border); padding:12px 16px; font-size:13.5px;}
  #settings.open{display:block;}
  #settings .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:6px;}
  #settings input{flex:1; min-width:220px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px;}
  #settings select{padding:8px; border:1px solid var(--border); border-radius:8px; font-size:13px;}
  #settings .save{background:var(--green); color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;}
  #settings .note{color:#7a6f5a; font-size:12px; margin-top:6px;}
  #modeBadge{font-size:11px; padding:2px 9px; border-radius:10px; background:#ffe9cf; color:#9c5400; margin-left:6px; vertical-align:middle;}
  #modeBadge.live{background:#dcf5e3; color:#11602c;}
  #chat{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; max-width:860px; width:100%; margin:0 auto;}
  .msg{max-width:82%; padding:10px 14px; border-radius:14px; font-size:15px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; box-shadow:0 1px 2px rgba(0,0,0,.08); position:relative;}
  .msg.bot{background:var(--bot); border:1px solid var(--border); border-top-left-radius:4px; align-self:flex-start;}
  .msg.user{background:var(--user); color:#fff; border-top-right-radius:4px; align-self:flex-end;}
  .msg.bot b{color:var(--navy);}
  .speak{position:absolute; right:-30px; top:6px; border:none; background:none; cursor:pointer; font-size:15px; opacity:.55;}
  .speak:hover{opacity:1;}
  .typing{align-self:flex-start; background:var(--bot); border:1px solid var(--border); border-radius:14px; padding:12px 16px; display:flex; gap:5px;}
  .typing span{width:7px; height:7px; background:#b9ad95; border-radius:50%; animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25} 40%{opacity:1}}
  #chips{display:flex; flex-wrap:wrap; gap:8px; padding:6px 16px; max-width:860px; width:100%; margin:0 auto;}
  .chip{background:var(--chip); border:1.5px solid var(--saffron); color:#9c5400; padding:8px 14px; border-radius:20px; cursor:pointer; font-size:14px;}
  .chip.sel{background:var(--saffron); color:#fff;}
  .chip.done{border-color:var(--green); color:var(--green); font-weight:600;}
  #checkbar{display:none; max-width:860px; width:100%; margin:0 auto; padding:6px 16px;}
  #checkbar.show{display:flex; gap:8px;}
  #checkbar button{flex:1; border:none; border-radius:10px; padding:11px; font-size:14.5px; font-weight:600; cursor:pointer;}
  #dlBtn{background:var(--navy); color:#fff;}
  #shBtn{background:#fff; color:var(--navy); border:1.5px solid var(--navy) !important;}
  footer{padding:10px 16px 14px; background:transparent;}
  .inputrow{display:flex; gap:8px; max-width:860px; margin:0 auto;}
  .inputrow input{flex:1; padding:12px 16px; border:1.5px solid var(--border); border-radius:24px; font-size:15px; outline:none; background:#fff;}
  .inputrow input:focus{border-color:var(--saffron);}
  .inputrow button{width:46px; height:46px; border-radius:50%; border:none; cursor:pointer; font-size:18px; flex-shrink:0;}
  #micBtn{background:#fff; border:1.5px solid var(--border);}
  #micBtn.rec{background:#e33; color:#fff; animation:pulse 1s infinite;}
  @keyframes pulse{50%{transform:scale(1.12)}}
  #sendBtn{background:var(--green); color:#fff;}
  .disclaim{text-align:center; font-size:10.5px; color:#9a8f78; margin-top:6px;}
</style>
</head>
<body>
<header>
  <div class="logo">🇮🇳</div>
  <div><h1 id="tTitle">Yojana Sathi</h1><div class="sub" id="tSub">Your welfare scheme guide</div></div>
  <span id="modeBadge">DEMO</span>
  <div class="spacer"></div>
  <div class="langbar">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="hi">हिं</button>
    <button data-lang="te">తె</button>
  </div>
  <button class="iconbtn" id="gear" title="Settings">⚙</button>
</header>

<div id="settings">
  <b id="tSet">AI Settings</b>
  <div class="row">
    <input type="password" id="apiKey" placeholder="Anthropic API key (sk-ant-…)">
    <select id="model">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
    </select>
    <button class="save" id="saveKey">Save</button>
  </div>
  <div class="note" id="tSetNote">With an API key the bot answers freely in your language (LLM mode). Without one, a built-in guided demo flow runs offline.</div>
</div>

<div id="chat"></div>
<div id="chips"></div>
<div id="checkbar">
  <button id="dlBtn">⬇ Download checklist</button>
  <button id="shBtn">📤 Share (SMS)</button>
</div>
<footer>
  <div class="inputrow">
    <button id="micBtn" title="Speak">🎤</button>
    <input id="box" placeholder="Type your message…" autocomplete="off">
    <button id="sendBtn" title="Send">➤</button>
  </div>
  <div class="disclaim" id="tDisc">Information is indicative. Confirm details at your nearest Common Service Centre (CSC) or Gram Panchayat.</div>
</footer>

// ===================== STATE =====================
let lang = "en";
let apiKey = "", model = "claude-sonnet-4-6";
try { apiKey = localStorage.getItem("ys_key") || ""; model = localStorage.getItem("ys_model") || model; lang = localStorage.getItem("ys_lang") || "en"; } catch(e){}
let llmHistory = [];           // {role, content} for LLM mode
let demo = null;               // demo flow state: {step, ans:{age,gen,occ,bpl,flags[]}, multiSel:[]}
let lastChecklist = "";        // latest checklist text for download/share
const $ = id => document.getElementById(id);
const chat = $("chat"), chips = $("chips");

// ===================== UI HELPERS =====================
function t(){ return I18N[lang]; }
function addMsg(text, who){
  const d = document.createElement("div");
  d.className = "msg " + who;
  // minimal markdown: **bold**
  d.innerHTML = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
  if (who === "bot" && "speechSynthesis" in window){
    const s = document.createElement("button");
    s.className = "speak"; s.textContent = "🔊"; s.title = "Listen";
    s.onclick = () => speak(text);
    d.appendChild(s);
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
let typingEl = null;
function showTyping(on){
  if (on && !typingEl){
    typingEl = document.createElement("div");
    typingEl.className = "typing";
    typingEl.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(typingEl); chat.scrollTop = chat.scrollHeight;
  } else if (!on && typingEl){ typingEl.remove(); typingEl = null; }
}
function setChips(list){
  chips.innerHTML = "";
  list.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c.cls ? " " + c.cls : "");
    b.textContent = c.label;
    b.onclick = () => c.fn(b);
    chips.appendChild(b);
  });
}
function speak(text){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\*\*/g,""));
    u.lang = {en:"en-IN", hi:"hi-IN", te:"te-IN"}[lang];
    speechSynthesis.speak(u);
  } catch(e){}
}

// ===================== LANGUAGE =====================
function applyLang(){
  const s = t();
  $("tTitle").textContent = s.title; $("tSub").textContent = s.sub;
  $("tSet").textContent = s.set; $("tSetNote").textContent = s.setNote;
  $("box").placeholder = s.placeholder; $("tDisc").textContent = s.disc;
  $("dlBtn").textContent = s.dl; $("shBtn").textContent = s.sh;
  document.querySelectorAll(".langbar button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang));
}
document.querySelectorAll(".langbar button").forEach(b => b.onclick = () => {
  lang = b.dataset.lang;
  try { localStorage.setItem("ys_lang", lang); } catch(e){}
  applyLang();
  restart();
});

// ===================== HOME / RESTART =====================
function homeChips(){
  setChips([
    {label: t().start, fn: () => { addMsg(t().start, "user"); startDemoOrLLM("eligibility"); }},
    {label: t().askDocs, fn: () => { addMsg(t().askDocs, "user"); startDemoOrLLM("docs"); }},
    {label: t().listAll, fn: () => { addMsg(t().listAll, "user"); listAll(); }}
  ]);
}
function restart(){
  chat.innerHTML = ""; chips.innerHTML = "";
  $("checkbar").classList.remove("show");
  llmHistory = []; demo = null; lastChecklist = "";
  addMsg(t().welcome, "bot");
  homeChips();
}
function listAll(){
  let out = "";
  SCHEMES.forEach((s,i) => { out += "**" + (i+1) + ". " + s.name[lang] + "**\n" + s.ben[lang] + "\n\n"; });
  addMsg(out.trim(), "bot");
  homeChips();
}

// ===================== MODE DISPATCH =====================
function startDemoOrLLM(intent){

    sendToLLM(intent === "eligibility"
      ? {en:"Help me find which schemes I am eligible for.", hi:"मुझे बताइए मैं किन योजनाओं का पात्र हूँ।", te:"నేను ఏ పథకాలకు అర్హుడినో చెప్పండి."}[lang]
      : {en:"Which documents do I need for these schemes?", hi:"इन योजनाओं के लिए कौन से दस्तावेज़ चाहिए?", te:"ఈ పథకాలకు ఏ పత్రాలు కావాలి?"}[lang]);
  } else if (intent === "eligibility"){
    demo = { step:0, ans:{age:0,gen:0,occ:0,bpl:0,flags:[]}, multiSel:[] };
    askDemoQ();
  } else {
    // docs without eligibility run: show generic core documents
    addMsg({en:"For most schemes you need: **Aadhaar card, bank passbook, ration card**. Run \"Find my schemes\" to get an exact personalised checklist.",
            hi:"अधिकतर योजनाओं के लिए चाहिए: **आधार कार्ड, बैंक पासबुक, राशन कार्ड**। सटीक व्यक्तिगत चेकलिस्ट के लिए \"मेरी योजनाएँ खोजें\" चलाएँ।",
            te:"చాలా పథకాలకు కావాల్సినవి: **ఆధార్ కార్డ్, బ్యాంక్ పాస్‌బుక్, రేషన్ కార్డ్**. ఖచ్చితమైన వ్యక్తిగత చెక్‌లిస్ట్ కోసం \"నా పథకాలు కనుగొనండి\" నడపండి."}[lang], "bot");
    homeChips();
  }
}

// ===================== DEMO (RULE-BASED) FLOW =====================
function askDemoQ(){
  const q = t().qs[demo.step];
  addMsg(q.q, "bot");
  if (q.multi){
    demo.multiSel = [];
    const cs = q.o.map((o,i) => ({label:o, fn:(btn) => {
      if (i === q.o.length-1){ demo.multiSel = []; document.querySelectorAll("#chips .chip").forEach(c=>c.classList.remove("sel")); btn.classList.add("sel"); return; }
      btn.classList.toggle("sel");
      const idx = demo.multiSel.indexOf(i);
      idx >= 0 ? demo.multiSel.splice(idx,1) : demo.multiSel.push(i);
    }}));
    cs.push({label:t().done, cls:"done", fn:() => {
      const sel = demo.multiSel.slice();
      const labels = sel.length ? sel.map(i=>q.o[i]).join(", ") : q.o[q.o.length-1];
      addMsg(labels, "user");
      demo.ans.flags = sel;
      finishDemo();
    }});
    setChips(cs);
  } else {
    setChips(q.o.map((o,i) => ({label:o, fn:() => {
      addMsg(o, "user");
      const key = ["age","gen","occ","bpl"][demo.step];
      demo.ans[key] = i;
      demo.step++;
      askDemoQ();
    }})));
  }
}
function finishDemo(){
  const a = demo.ans;
  const matched = SCHEMES.filter(s => { try { return s.test(a); } catch(e){ return false; } });
  let out;
  if (matched.length){
    out = t().shortHead + "\n";
    matched.forEach((s,i) => {
      out += "\n**" + (i+1) + ". " + s.name[lang] + "**\n" +
             s.ben[lang] + "\n" +
             "✔ " + t().whyLabel + ": " + s.why[lang] + "\n" +
             "📍 " + t().applyLabel + ": " + s.apply[lang] + "\n";
    });
    out += "\n" + t().checkOffer;
    lastChecklist = buildChecklist(matched);
    $("checkbar").classList.add("show");
  } else {
    out = t().noMatch;
  }
  addMsg(out, "bot");
  demo = null;
  setChips([{label:t().restart, fn:restart}]);
}
function buildChecklist(matched){
  let txt = t().checkHead + "\n" + "=".repeat(34) + "\n";
  matched.forEach((s,i) => {
    txt += "\n" + (i+1) + ") " + s.name[lang] + "\n";
    txt += "   " + t().docsLabel + ":\n";
    s.docs[lang].forEach(d => txt += "   [ ] " + d + "\n");
    txt += "   " + t().applyLabel + ": " + s.apply[lang] + "\n";
  });
  txt += "\n" + t().disc + "\n";
  return txt;
}

// ===================== LLM MODE (Claude API) =====================
function systemPrompt(){
  const langName = {en:"English", hi:"Hindi (Devanagari)", te:"Telugu"}[lang];
  const cat = SCHEMES.map(s => ({
    name: s.name.en, benefit: s.ben.en, documents: s.docs.en, apply: s.apply.en
  }));
  return "You are Yojana Sathi, a friendly assistant helping low-literacy users in India discover government welfare schemes.\n" +
  "RULES:\n" +
  "1. Reply ONLY in " + langName + ". Use very simple words and short sentences. Keep replies under 120 words unless listing schemes.\n" +
  "2. You may ONLY discuss the schemes in the CATALOGUE below. For anything else, politely say you only know these schemes and suggest visiting the nearest Common Service Centre (CSC).\n" +
  "3. Eligibility flow: when the user wants to find their schemes, ask 4-6 SHORT questions ONE AT A TIME (age group, gender, occupation, BPL/ration card or income, household details like farmland / pucca house / LPG / pregnancy / daughter under 10 / bank account). After EVERY question, append a final line exactly in this format: [OPTIONS]option1|option2|option3[/OPTIONS] (options in " + langName + ").\n" +
  "4. After the questions, give a personalised shortlist: scheme name, benefit, why they qualify, where to apply. Then offer a document checklist.\n" +
  "5. Whenever you provide the document checklist, wrap ONLY the plain-text checklist between [CHECKLIST] and [/CHECKLIST] markers. Keep it short and SMS-friendly: scheme name, documents with [ ] boxes, where to apply.\n" +
  "6. Never invent benefit amounts or rules not in the catalogue. Remind users to confirm at their CSC or Gram Panchayat.\n\n" +
  "CATALOGUE:\n" + JSON.stringify(cat, null, 1);
}
async function sendToLLM(userText){
  llmHistory.push({role:"user", content:userText});
  setChips([]); showTyping(true);
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({ model, max_tokens:1200, system:systemPrompt(), messages:llmHistory })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    let text = (data.content || []).filter(b=>b.type==="text").map(b=>b.text).join("");
    llmHistory.push({role:"assistant", content:text});

    // extract checklist
    const cm = text.match(/\[CHECKLIST\]([\s\S]*?)\[\/CHECKLIST\]/);
    if (cm){
      lastChecklist = cm[1].trim() + "\n\n" + t().disc;
      $("checkbar").classList.add("show");
      text = text.replace(/\[CHECKLIST\]|\[\/CHECKLIST\]/g, "").trim();
    }
    // extract quick-reply options
    let opts = null;
    const om = text.match(/\[OPTIONS\]([\s\S]*?)\[\/OPTIONS\]/);
    if (om){ opts = om[1].split("|").map(s=>s.trim()).filter(Boolean); text = text.replace(om[0], "").trim(); }

    showTyping(false);
    addMsg(text, "bot");
    if (opts && opts.length) setChips(opts.map(o => ({label:o, fn:() => { addMsg(o,"user"); sendToLLM(o); }})));
    else setChips([{label:t().restart, fn:restart}]);
  } catch(err){
    showTyping(false);
    addMsg(t().err, "bot");
    homeChips();
  }
}

// ===================== INPUT =====================
function handleSend(){
  const v = $("box").value.trim();
  if (!v) return;
  $("box").value = "";
  addMsg(v, "user");
  if (apiKey) sendToLLM(v);
  else if (demo) addMsg({en:"Please tap one of the buttons above to answer. 🙏", hi:"कृपया जवाब देने के लिए ऊपर का कोई बटन दबाएँ। 🙏", te:"దయచేసి సమాధానానికి పైన ఉన్న బటన్ నొక్కండి. 🙏"}[lang], "bot");
  else { // simple offline intent match
    const low = v.toLowerCase();
    if (/(eligib|scheme|yojana|योजना|पात्र|పథక|అర్హ)/i.test(low)) startDemoOrLLM("eligibility");
    else if (/(doc|दस्तावेज|कागज|పత్రా)/i.test(low)) startDemoOrLLM("docs");
    else { addMsg({en:"In offline demo mode I can run the guided flow. Tap a button below, or add an API key in ⚙ settings for free chat.",
                   hi:"ऑफलाइन डेमो मोड में मैं गाइडेड फ्लो चला सकता हूँ। नीचे बटन दबाएँ, या खुलकर बात करने के लिए ⚙ सेटिंग्स में API key जोड़ें।",
                   te:"ఆఫ్‌లైన్ డెమో మోడ్‌లో గైడెడ్ ఫ్లో నడపగలను. కింది బటన్ నొక్కండి, లేదా స్వేచ్ఛా చాట్ కోసం ⚙ సెట్టింగ్‌లలో API key జోడించండి."}[lang], "bot"); homeChips(); }
  }
}
$("sendBtn").onclick = handleSend;
$("box").addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });

// ===================== VOICE INPUT =====================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR){
  const rec = new SR();
  rec.interimResults = false;
  let recording = false;
  $("micBtn").onclick = () => {
    if (recording){ rec.stop(); return; }
    rec.lang = {en:"en-IN", hi:"hi-IN", te:"te-IN"}[lang];
    rec.start(); recording = true; $("micBtn").classList.add("rec");
  };
  rec.onresult = e => { $("box").value = e.results[0][0].transcript; handleSend(); };
  rec.onend = () => { recording = false; $("micBtn").classList.remove("rec"); };
  rec.onerror = () => { recording = false; $("micBtn").classList.remove("rec"); };
} else { $("micBtn").style.display = "none"; }

// ===================== CHECKLIST DOWNLOAD / SHARE =====================
$("dlBtn").onclick = () => {
  if (!lastChecklist) return;
  const blob = new Blob([lastChecklist], {type:"text/plain;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "yojana-checklist-" + lang + ".txt";
  a.click(); URL.revokeObjectURL(a.href);
};
$("shBtn").onclick = () => {
  if (!lastChecklist) return;
  if (navigator.share) navigator.share({text:lastChecklist}).catch(()=>{});
  else location.href = "sms:?body=" + encodeURIComponent(lastChecklist.slice(0, 900));
};

// ===================== SETTINGS =====================
function updateBadge(){
  const b = $("modeBadge");
  if (apiKey){ b.textContent = "LLM ✓"; b.classList.add("live"); }
  else { b.textContent = "DEMO"; b.classList.remove("live"); }
}
$("gear").onclick = () => $("settings").classList.toggle("open");
$("saveKey").onclick = () => {
  apiKey = $("apiKey").value.trim();
  model = $("model").value;
  try { localStorage.setItem("ys_key", apiKey); localStorage.setItem("ys_model", model); } catch(e){}
  $("settings").classList.remove("open");
  updateBadge();
  addMsg(apiKey ? t().keySaved : t().keyCleared, "bot");
};

// ===================== INIT =====================
$("apiKey").value = apiKey; $("model").value = model;
updateBadge(); applyLang(); restart();

</script>
